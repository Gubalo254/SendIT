<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - SendIT</title>
    <link rel="stylesheet" href="/static/style1.css">
</head>
<body>
    <nav class="nav">
        <div class="nav-brand">SendIT</div>
        <ul class="nav-links">
            <li><a href="/admin" class="active">Admin Panel</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>
    <div class="container">
        <h1>Admin Dashboard</h1>
        <h2>All Parcels</h2>
        <form method="POST">
            <table class="parcel-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Pickup</th>
                        <th>Destination</th>
                        <th>Status</th>
                        <th>Current Location</th>
                        <th>Update Status</th>
                        <th>Update Location</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#1234</td>
                        <td>Lagos</td>
                        <td>Abuja</td>
                        <td>In Transit</td>
                        <td><input type="text" name="location_1234" value="Ibadan" class="form-control"></td>
                        <td>
                            <select name="status_1234" class="form-control">
                                <option value="In Transit" selected>In Transit</option>
                                <option value="Delivered">Delivered</option>
                                <option value="Cancelled">Cancelled</option>
                            </select>
                        </td>
                        <td><button type="submit" class="btn btn-outline-info btn-small">Update</button></td>
                    </tr>
                    <tr>
                        <td>#5678</td>
                        <td>Nairobi</td>
                        <td>Kampala</td>
                        <td>Delivered</td>
                        <td><input type="text" name="location_5678" value="Kampala" class="form-control"></td>
                        <td>
                            <select name="status_5678" class="form-control">
                                <option value="Delivered" selected>Delivered</option>
                            </select>
                        </td>
                        <td><button type="submit" class="btn btn-outline-info btn-small">Update</button></td>
                    </tr>
                </tbody>
            </table>
        </form>
    </div>
</body>
</html>
